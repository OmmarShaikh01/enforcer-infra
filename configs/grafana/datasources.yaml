apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://enforcer-loki-srvc:3100
    isDefault: false
    jsonData:
      maxLines: 1000
    editable: true

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://enforcer-prometheus-srvc:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    editable: true
